# Trading System Configuration

data:
  exchange: binance
  symbol: BTC/USDT
  timeframe: 15m
  lookback_days: 30

model:
  type: lstm
  horizon: 1
  params: {}   # Hyperparameters will be provided by evolution

validation:
  train_window: 2000      # candles for training (15m: ~20.8 days)
  validation_window: 672  # 1 week validation (672*15min = 168 hours)
  step_size: 96          # advance by 24 hours each fold (96*15min = 24h)

trading:
  initial_capital: 10000.0
  commission: 0.0006      # 0.06% taker fee
  max_position_size: 1.0  # 100% of equity
  signal_threshold: 0.3   # minimum signal to act

loop:
  wait_hours: 1          # wait between iterations

execution:
  backtest:
    slippage_rate: 0.0005
  live:
    enabled: false
    api_key: null
    api_secret: null

evolution:
  enabled: false
  population_size: 50
  generations: 20
  elite_count: 5
  fitness_metric: directional_accuracy
  hyperparam_ranges:
    hidden_dim: [16, 64]          # LSTM hidden state size (int) - reduced to prevent overfitting
    num_layers: [1, 2]            # Number of LSTM layers (int) - simpler architectures
    dropout: [0.3, 0.6]           # Dropout rate (float) - increased regularization
    lr: [0.0005, 0.005]           # Learning rate (float) - narrower range
    epochs: [30, 50]              # Training epochs (int) - more training with early stopping (to be added)
    signal_threshold: [0.2, 0.3, 0.4]

logging:
  level: INFO
  console: true
  file: true
